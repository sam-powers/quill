name: Release

# Builds macOS installers when a version tag is pushed
# (e.g. `git tag v0.1.0 && git push origin v0.1.0`) and attaches them to a
# DRAFT GitHub Release. A maintainer reviews the draft, fills in the notes
# (see docs/release-notes/), and publishes it manually.
#
# Releases are macOS-only for now: the @claude integration (Claude CLI
# discovery and session lookup) is Unix-path-based and untested elsewhere,
# and we don't ship builds that can't deliver the full experience.
#
# The macOS bundles are unsigned — no Apple Developer certificate is wired in —
# so Gatekeeper makes users right-click → Open on first launch. This is
# documented in the README and the user guide.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.platform }}${{ matrix.args && format(' {0}', matrix.args) || '' }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and attach installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quill ${{ github.ref_name }}'
          releaseDraft: true
          releaseBody: |
            Download the installer for your platform from the assets below.
            macOS builds are unsigned — right-click the app and choose **Open**
            on first launch. See the README's install section for details.
          args: ${{ matrix.args }}
