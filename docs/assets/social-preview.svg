<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82d6"/>
      <stop offset="1" stop-color="#1e5aa8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Feather quill, scaled from the app icon geometry (icon space 1024 → 0.42, offset 80,90) -->
  <g transform="translate(80 90) scale(0.42)">
    <path fill="#ffffff" d="M 460 530
             C 350 430, 360 260, 530 205
             C 630 170, 725 170, 800 195
             C 770 300, 700 420, 590 520
             C 530 565, 480 570, 455 545
             Z"/>
    <path d="M 460 530 C 570 410, 690 300, 800 195"
          stroke="url(#bg)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <g stroke="url(#bg)" stroke-width="22" stroke-linecap="round" fill="none">
      <line x1="588" y1="562" x2="642" y2="438"/>
      <line x1="512" y1="588" x2="548" y2="478"/>
    </g>
    <path fill="#ffffff" d="M 448 520
             C 406 572, 342 662, 262 798
             C 350 678, 422 592, 470 542
             Z"/>
  </g>

  <g fill="#ffffff" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="560" y="280" font-size="120" font-weight="700">Quill</text>
    <text x="563" y="350" font-size="38" opacity="0.92">A collaborative writing space for</text>
    <text x="563" y="404" font-size="38" opacity="0.92">you and Claude — beyond the CLI.</text>
    <text x="563" y="488" font-size="28" opacity="0.7">macOS · open source · built on Claude Code</text>
  </g>
</svg>
