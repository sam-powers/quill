<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1100px;
        height: 740px;
        overflow: hidden;
      }
      body {
        background: #2d6dc0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'SF Mono', Menlo, Monaco, monospace;
      }
      .window {
        width: 920px;
        background: #1e2228;
        border-radius: 12px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }
      .titlebar {
        height: 38px;
        background: #2a2f37;
        display: flex;
        align-items: center;
        padding: 0 14px;
        position: relative;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 8px;
      }
      .dot.r {
        background: #ff5f57;
      }
      .dot.y {
        background: #febc2e;
      }
      .dot.g {
        background: #28c840;
      }
      .title {
        position: absolute;
        left: 0;
        right: 0;
        text-align: center;
        color: #9aa3ad;
        font-size: 13px;
        font-family: -apple-system, 'Helvetica Neue', sans-serif;
      }
      .body {
        padding: 24px 28px 32px;
        font-size: 17px;
        line-height: 1.7;
        color: #d6dce3;
      }
      .dim {
        color: #7d8794;
      }
      .prompt {
        color: #61afef;
      }
      .cmd {
        color: #e6edf3;
      }
      .slash {
        color: #c678dd;
      }
      .claude-box {
        border: 1px solid #4a5260;
        border-radius: 8px;
        padding: 10px 16px;
        margin: 14px 0;
        color: #aab4c0;
      }
      .claude-box .spark {
        color: #d97757;
      }
      .out {
        margin-top: 14px;
      }
      .out .bullet {
        color: #98c379;
      }
      .caret {
        display: inline-block;
        width: 9px;
        height: 19px;
        background: #d6dce3;
        vertical-align: text-bottom;
        margin-left: 2px;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="title">claude — ~/work</span>
      </div>
      <div class="body">
        <div><span class="dim">~/work</span></div>
        <div><span class="prompt">❯</span> <span class="cmd">claude</span></div>
        <div class="claude-box">
          <span class="spark">✻</span> Claude Code
          <span class="dim">— new session in ~/work</span>
        </div>
        <div>
          <span class="prompt">&gt;</span> <span class="cmd" id="ask"></span
          ><span class="caret" id="c1"></span>
        </div>
        <div class="out" id="out1a" style="display: none">
          <div>
            <span class="bullet">⏺</span> Researching
            <span class="dim">— README, user guide, plugin docs…</span>
          </div>
        </div>
        <div id="out1b" style="display: none">
          <div>
            <span class="bullet">⏺</span> Write(<span class="cmd">using-quill-at-work.md</span>)
            <span class="dim">+84 lines — report drafted</span>
          </div>
        </div>
        <div id="slashline" style="display: none; margin-top: 14px">
          <span class="prompt">&gt;</span> <span class="slash" id="slashcmd"></span
          ><span class="caret" id="c2"></span>
        </div>
        <div class="out" id="out2" style="display: none">
          <div>
            <span class="bullet">⏺</span> Opening <span class="cmd">using-quill-at-work.md</span>
            in Quill…
          </div>
          <div class="dim" style="margin-left: 18px">
            linked to this session — comment @claude in Quill and this agent answers
          </div>
        </div>
      </div>
    </div>
    <!-- The page starts with the dynamic lines hidden/empty; stage-hero.mjs
         reveals and fills them frame by frame to animate the scene. -->
    <script>
      window.reveal = (sel) => (document.querySelector(sel).style.display = 'block');
      window.setText = (sel, text) => (document.querySelector(sel).textContent = text);
      window.hide = (sel) => (document.querySelector(sel).style.display = 'none');
    </script>
  </body>
</html>
